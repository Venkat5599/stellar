# nginx reverse proxy for Veil.
#   sudo cp deploy/nginx-veil.conf /etc/nginx/sites-available/veil
#   sudo ln -s /etc/nginx/sites-available/veil /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# TLS: run `sudo certbot --nginx -d your-domain` after this is up.

server {
    listen 80;
    server_name your-domain.example;   # <-- change to your domain / VPS IP

    # MCP server (agents connect here) — must come before the catch-all `/`.
    location /mcp {
        proxy_pass http://127.0.0.1:8402;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Streamable HTTP / SSE needs buffering off + a long read timeout
        # (a ZK deposit through veil_pay can take ~90s).
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_set_header Connection "";
    }

    # Next app (landing + /agent + /dashboard).
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
