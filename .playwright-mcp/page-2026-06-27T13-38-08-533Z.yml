    - generic [ref=e104]:
      - heading "Private in three moves" [level=2] [ref=e105]
      - paragraph [ref=e106]: Stealth addressing hides the recipient; a zero-knowledge pool hides the link and the amount.
      - generic [ref=e107]:
        - generic [ref=e108]:
          - img [ref=e110]
          - heading "Send" [level=3] [ref=e113]
          - paragraph [ref=e114]: Pay from the recipient's published scan key. An ECDH shared secret derives the note; only they can find it. The chain sees a random commitment — never the recipient.
        - generic [ref=e115]:
          - img [ref=e117]
          - heading "Pool" [level=3] [ref=e121]
          - paragraph [ref=e122]: The commitment is inserted into an on-chain Merkle tree with a zero-knowledge insert proof. USDC is pulled in. No amount is tied to any identity.
        - generic [ref=e123]:
          - img [ref=e125]
          - heading "Receive" [level=3] [ref=e128]
          - paragraph [ref=e129]: The recipient scans for their note, then withdraws to a one-time stealth address — proving they own an unspent leaf without revealing which deposit it was.
    - generic [ref=e130]:
      - heading "ZK is load-bearing, not decorative" [level=2] [ref=e131]
      - generic [ref=e132]:
        - generic [ref=e133]:
          - img [ref=e134]
          - heading "Remove the pool proof" [level=3] [ref=e138]
          - paragraph [ref=e139]: The withdrawal must name its deposit → the deposit↔withdrawal link is public → no privacy.
        - generic [ref=e140]:
          - img [ref=e141]
          - heading "Remove the nullifier" [level=3] [ref=e146]
          - paragraph [ref=e147]: A note becomes spendable twice → the pool drains. The nullifier is the double-spend guard, proven in-circuit.
        - generic [ref=e148]:
          - img [ref=e149]
          - heading "Remove the stealth notes" [level=3] [ref=e152]
          - paragraph [ref=e153]: The recipient's identity leaks at deposit time, and the sender must hand secrets over out-of-band.
